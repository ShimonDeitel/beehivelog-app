name: BeehiveLog
options:
  bundleIdPrefix: com.shimondeitel.beehivelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BeehiveLog:
    type: application
    platform: iOS
    sources:
      - path: BeehiveLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beehivelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BeehiveLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BeehiveLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeehiveLogTests
      - path: BeehiveLog.storekit
    dependencies:
      - target: BeehiveLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beehivelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BeehiveLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BeehiveLogUITests
    dependencies:
      - target: BeehiveLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beehivelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BeehiveLog:
    build:
      targets:
        BeehiveLog: all
        BeehiveLogTests: [test]
        BeehiveLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BeehiveLog.storekit
    test:
      config: Debug
      storeKitConfiguration: BeehiveLog.storekit
      targets:
        - BeehiveLogTests
        - BeehiveLogUITests
    archive:
      config: Release
